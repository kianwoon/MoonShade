name: Deploy Privacy Policy

on:
  push:
    branches: [main]
    paths: [privacy-policy.md]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Convert markdown to HTML
        run: |
          mkdir -p _site
          cat > _site/index.html << 'HEADER'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>MoonShade Privacy Policy</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                     max-width: 720px; margin: 2rem auto; padding: 0 1rem;
                     line-height: 1.6; color: #1a1a1a; }
              table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
              th, td { border: 1px solid #ddd; padding: 0.5rem 1rem; text-align: left; }
              th { background: #f5f5f5; }
              a { color: #4a6cf7; }
              hr { border: none; border-top: 1px solid #e5e5e5; margin: 2rem 0; }
            </style>
          </head>
          <body>
          HEADER
          python3 -c "
          import re
          with open('privacy-policy.md') as f:
              md = f.read()
          html = md
          html = re.sub(r'^### (.+)$', r'<h3>\1</h3>', html, flags=re.MULTILINE)
          html = re.sub(r'^## (.+)$', r'<h2>\1</h2>', html, flags=re.MULTILINE)
          html = re.sub(r'^---$', '<hr>', html, flags=re.MULTILINE)
          html = re.sub(r'^\|(.+)\|$', lambda m: '<tr>'+''.join(f'<td>{c.strip()}</td>' for c in m.group(1).split('|'))+'</tr>', html, flags=re.MULTILINE)
          html = re.sub(r'^\|[-| :]+\|$', '', html, flags=re.MULTILINE)
          html = re.sub(r'^- (.+)$', r'<li>\1</li>', html, flags=re.MULTILINE)
          html = re.sub(r'((?:<li>.*</li>\n?)+)', r'<ul>\1</ul>', html)
          html = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', html)
          html = re.sub(r'\[(.+?)\]\((.+?)\)', r'<a href=\"\2\">\1</a>', html)
          print(html)
          " >> _site/index.html
          echo '</body></html>' >> _site/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
